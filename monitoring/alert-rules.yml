# Monitoring Enhancement: Prometheus Alert Rules for createorder
# Deploy to AlertManager alongside Prometheus scrape config.
groups:
  - name: createorder_alerts
    interval: 30s
    rules:

      # ── High Error Rate ──────────────────────────────────────────────────────
      - alert: HighErrorRate_createorder
        expr: |
          rate(createorder_errors_total{service="createorder"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: createorder
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on createorder"

      # ── High HTTP Latency ────────────────────────────────────────────────────
      - alert: HighLatency_createorder
        expr: |
          histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{service="createorder"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: createorder
        annotations:
          summary: "p95 latency above 2s on createorder"
          description: "p95 latency is {{ $value }}s on createorder"

      # ── Service Down ─────────────────────────────────────────────────────────
      - alert: ServiceDown_createorder
        expr: |
          up{job="createorder"} == 0
        for: 1m
        labels:
          severity: critical
          service: createorder
        annotations:
          summary: "createorder is DOWN"
          description: "createorder Prometheus target is not reachable"

      # ── High Heap Memory ─────────────────────────────────────────────────────
      - alert: HighHeapMemory_createorder
        expr: |
          (jvm_memory_used_bytes{service="createorder",area="heap"} /
           jvm_memory_max_bytes{service="createorder",area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
          service: createorder
        annotations:
          summary: "JVM Heap above 85% on createorder"
          description: "Heap usage is {{ $value | humanizePercentage }} on createorder"

      # ── Too Many 5xx Responses ───────────────────────────────────────────────
      - alert: High5xxRate_createorder
        expr: |
          rate(http_server_requests_seconds_count{service="createorder",status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: createorder
        annotations:
          summary: "High 5xx rate on createorder"
          description: "5xx rate is {{ $value | humanize }} req/s on createorder"

      # ── High CPU Usage ───────────────────────────────────────────────────────
      - alert: HighCpuUsage_createorder
        expr: |
          process_cpu_usage{service="createorder"} > 0.80
        for: 5m
        labels:
          severity: warning
          service: createorder
        annotations:
          summary: "CPU above 80% on createorder"
          description: "CPU usage is {{ $value | humanizePercentage }} on createorder"
