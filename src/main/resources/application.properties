# Application Configuration
spring.application.name=createorder-service
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/createorder_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=createorder-group
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Topics
kafka.topic.order-created=order.created
kafka.topic.recommendation-generated=recommendation.generated
kafka.topic.product-viewed=product.viewed

# Recommendation Engine Configuration
recommendation.default.limit=10
recommendation.cache.enabled=true
recommendation.cache.ttl=3600
recommendation.ml.model.enabled=false
recommendation.ml.model.endpoint=http://localhost:5000/predict

# Logging Configuration
logging.level.root=INFO
logging.level.com.orderprocessing.createorder=DEBUG
logging.level.org.springframework.kafka=INFO

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

